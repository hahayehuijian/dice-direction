<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚪</text></svg>" />
  <title>选门</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 标题 ===== */
    .title {
      text-align: center;
      margin-bottom: 16px;
    }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .title h1 {
      font-size: 1.5rem;
      color: #fff;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255,200,50,0.6);
    }
    .title p {
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* ===== 进度条 ===== */
    .progress-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .progress-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: transparent;
      transition: all 0.4s ease;
    }
    .progress-dot.done {
      background: #ffd700;
      border-color: #ffd700;
      box-shadow: 0 0 10px rgba(255,215,0,0.8);
    }

    /* ===== 方位区域 - 固定2x2网格 ===== */
    .directions-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: min(420px, 88vw);
      margin-bottom: 24px;
    }

    .direction-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
      position: relative;
      overflow: hidden;
      min-height: 120px;
    }

    .direction-card.assigned {
      border-color: var(--color);
      background: rgba(var(--rgb), 0.12);
      box-shadow: 0 0 25px rgba(var(--rgb), 0.35), inset 0 0 15px rgba(var(--rgb), 0.08);
    }

    .direction-card.assigned::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle, rgba(var(--rgb), 0.12) 0%, transparent 60%);
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    .direction-card.highlight {
      animation: card-flash 0.6s ease;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    @keyframes card-flash {
      0% { transform: scale(1); }
      30% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    .direction-icon {
      font-size: 2rem;
      line-height: 1;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 0 6px currentColor);
    }

    .direction-name {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 3px;
      position: relative;
      z-index: 1;
    }

    .assigned-player {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.9);
      letter-spacing: 1px;
      position: relative;
      z-index: 1;
      background: rgba(0,0,0,0.35);
      padding: 4px 14px;
      border-radius: 20px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 方位卡片颜色 */
    .card-north { --color: #4ecdc4; --rgb: 78,205,196; color: #4ecdc4; }
    .card-south { --color: #ff6b6b; --rgb: 255,107,107; color: #ff6b6b; }
    .card-west  { --color: #a29bfe; --rgb: 162,155,254; color: #a29bfe; }
    .card-east  { --color: #ffd700; --rgb: 255,215,0; color: #ffd700; }

    /* ===== 摇骰区域 ===== */
    .roll-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .current-player-info {
      text-align: center;
    }

    .player-label {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .player-name {
      color: #ffd700;
      font-weight: 700;
      font-size: 1.6rem;
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(255,215,0,0.4);
      transition: all 0.3s ease;
    }

    /* ===== CSS 指南针按钮 ===== */
    .roll-btn {
      position: relative;
      width: min(160px, 40vw);
      height: min(160px, 40vw);
      border-radius: 50%;
      border: 3px solid rgba(255,215,0,0.4);
      background: radial-gradient(circle at 40% 35%, #2c2c55, #1a1a38);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      box-shadow:
        0 8px 30px rgba(0,0,0,0.5),
        inset 0 0 20px rgba(255,215,0,0.08);
      transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94),
                  box-shadow 0.3s ease,
                  border-color 0.3s ease;
      overflow: hidden;
    }

    .roll-btn::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        from 0deg,
        transparent 0%,
        rgba(255,215,0,0.3) 25%,
        transparent 50%
      );
      opacity: 0;
      transition: opacity 0.3s ease;
      animation: border-spin 3s linear infinite;
    }

    .roll-btn:not(.disabled):hover::before,
    .roll-btn:not(.disabled):active::before {
      opacity: 1;
    }

    @keyframes border-spin {
      to { transform: rotate(360deg); }
    }

    .roll-btn:not(.disabled):hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow:
        0 14px 40px rgba(0,0,0,0.6),
        0 0 30px rgba(255,215,0,0.2),
        inset 0 0 20px rgba(255,215,0,0.12);
      border-color: rgba(255,215,0,0.8);
    }

    .roll-btn:not(.disabled):active {
      transform: translateY(1px) scale(0.95);
      transition-duration: 0.1s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .roll-btn.disabled {
      cursor: not-allowed;
      opacity: 0.4;
      pointer-events: none;
    }

    /* ===== CSS 指南针（静态） ===== */
    .compass {
      width: 70%;
      height: 70%;
      position: relative;
      z-index: 1;
    }

    .compass-ring {
      position: absolute;
      inset: 0;
      border: 2px solid rgba(255,215,0,0.25);
      border-radius: 50%;
    }
    .compass-ring-inner {
      position: absolute;
      inset: 12%;
      border: 1.5px solid rgba(255,215,0,0.15);
      border-radius: 50%;
    }

    /* 刻度线 */
    .compass-tick {
      position: absolute;
      top: 0;
      left: 50%;
      width: 1.5px;
      height: 8px;
      background: rgba(255,215,0,0.4);
      transform-origin: 50% calc(var(--r) / 2);
    }
    .compass-tick.major {
      width: 2px;
      height: 12px;
      background: rgba(255,215,0,0.7);
    }

    /* 方向标注 */
    .compass-label {
      position: absolute;
      font-size: 10px;
      font-weight: 700;
      color: rgba(255,215,0,0.6);
    }
    .compass-label-n { top: -2px; left: 50%; transform: translateX(-50%); color: #ff4757; }
    .compass-label-s { bottom: -2px; left: 50%; transform: translateX(-50%); }
    .compass-label-e { right: -2px; top: 50%; transform: translateY(-50%); }
    .compass-label-w { left: -2px; top: 50%; transform: translateY(-50%); }

    /* 指针 */
    .compass-needle {
      position: absolute;
      inset: 0;
      transition: transform 0.3s ease;
    }
    .compass-needle-n {
      position: absolute;
      left: 50%;
      top: 14%;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-bottom: 30px solid #ff4757;
      transform: translateX(-50%);
      filter: drop-shadow(0 0 4px rgba(255,71,87,0.5));
    }
    .compass-needle-s {
      position: absolute;
      left: 50%;
      bottom: 14%;
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 24px solid rgba(255,255,255,0.35);
      transform: translateX(-50%);
    }
    .compass-center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 8px;
      height: 8px;
      background: #ffd700;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 8px rgba(255,215,0,0.8);
    }

    /* ===== 旋转加载动画 ===== */
    .compass.spinning .compass-needle {
      animation: compass-spin-fast 0.4s linear infinite;
    }
    .compass.spinning .compass-ring {
      animation: ring-pulse 0.8s ease-in-out infinite;
    }

    @keyframes compass-spin-fast {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes ring-pulse {
      0%, 100% { border-color: rgba(255,215,0,0.25); }
      50% { border-color: rgba(255,215,0,0.7); }
    }

    /* ===== 按钮文字 ===== */
    .roll-btn-text {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      margin-top: 4px;
      transition: color 0.3s ease;
    }

    /* ===== 操作按钮 ===== */
    .action-btns-wrap {
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 4px;
    }

    .action-btn {
      display: none;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      padding: 8px 22px;
      border-radius: 50px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s ease;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .action-btn.visible {
      display: inline-flex;
      animation: fadeIn 0.3s ease;
    }

    .action-btn:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.35);
      color: #fff;
    }
    .action-btn:active {
      transform: scale(0.96);
    }
    .action-btn .undo-icon {
      font-size: 1rem;
    }

    /* ===== 右下角重置按钮（始终可见） ===== */
    .bottom-reset-wrap {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 50;
      text-align: right;
    }

    .bottom-reset-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.3);
      padding: 5px 14px;
      border-radius: 50px;
      font-size: 0.7rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.25s ease;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .bottom-reset-btn:hover {
      color: rgba(255,255,255,0.6);
      border-color: rgba(255,255,255,0.25);
    }

    .reset-confirm {
      position: absolute;
      bottom: 100%;
      right: 0;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(20,20,40,0.9);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px;
      padding: 6px 12px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      animation: fadeIn 0.2s ease;
      white-space: nowrap;
    }

    .reset-confirm.hidden {
      display: none;
    }

    .reset-confirm-text {
      color: rgba(255,255,255,0.6);
      font-size: 0.75rem;
    }

    .reset-confirm-yes,
    .reset-confirm-no {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 0.75rem;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7);
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .reset-confirm-yes:hover {
      background: rgba(255,107,107,0.2);
      border-color: rgba(255,107,107,0.5);
      color: #ff6b6b;
    }

    .reset-confirm-no:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }

    /* ===== 飞散粒子 ===== */
    .particle {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      animation: particle-fly 0.9s ease-out forwards;
      z-index: 999;
    }

    @keyframes particle-fly {
      0%   { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
    }

    /* ===== 完成弹窗 ===== */
    .complete-banner {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .complete-banner.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    .complete-box {
      background: linear-gradient(145deg, #1e1e40, #12122a);
      border: 2px solid rgba(255,215,0,0.5);
      border-radius: 24px;
      padding: 36px 40px;
      text-align: center;
      box-shadow: 0 0 50px rgba(255,215,0,0.15);
      animation: pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 90vw;
    }

    @keyframes pop-in {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .complete-box h2 {
      font-size: 1.6rem;
      color: #ffd700;
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }

    .result-list {
      list-style: none;
      margin-bottom: 28px;
    }

    .result-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      border-radius: 12px;
      margin-bottom: 8px;
      background: rgba(255,255,255,0.05);
      font-size: 1rem;
      gap: 20px;
    }

    .result-player { color: rgba(255,255,255,0.8); }
    .result-arrow  { color: rgba(255,255,255,0.3); }
    .result-dir    { font-weight: 700; font-size: 1.1rem; }

    .reset-btn {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a2e;
      border: none;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
      font-family: inherit;
    }

    .reset-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,215,0,0.5);
    }

    .reset-btn:active {
      transform: translateY(0);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 380px) {
      .directions-grid { gap: 8px; }
      .direction-card { padding: 14px 10px; min-height: 100px; }
      .direction-name { font-size: 1.1rem; }
      .player-name { font-size: 1.3rem; }
      .compass-needle-n { border-left-width: 6px; border-right-width: 6px; border-bottom-width: 22px; }
      .compass-needle-s { border-left-width: 5px; border-right-width: 5px; border-top-width: 18px; }
    }

    @media (min-height: 800px) {
      .directions-grid { margin-bottom: 32px; }
      .roll-section { gap: 18px; }
    }
  </style>
</head>
<body>

  <!-- 标题 -->
  <div class="title">
    <div class="title-row">
      <h1>🧭 选门</h1>
    </div>
    <p>4人依次点击 · 随机分配四个方向</p>
  </div>

  <!-- 进度点 -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-dot" id="dot0"></div>
    <div class="progress-dot" id="dot1"></div>
    <div class="progress-dot" id="dot2"></div>
    <div class="progress-dot" id="dot3"></div>
  </div>

  <!-- 四个方位卡片 - 固定2x2布局 -->
  <div class="directions-grid">
    <div class="direction-card card-north" id="card-north">
      <div class="direction-icon">🚪</div>
      <div class="direction-name">正北</div>
    </div>
    <div class="direction-card card-east" id="card-east">
      <div class="direction-icon">🚪</div>
      <div class="direction-name">正东</div>
    </div>
    <div class="direction-card card-west" id="card-west">
      <div class="direction-icon">🚪</div>
      <div class="direction-name">正西</div>
    </div>
    <div class="direction-card card-south" id="card-south">
      <div class="direction-icon">🚪</div>
      <div class="direction-name">正南</div>
    </div>
  </div>

  <!-- 摇骰区域 -->
  <div class="roll-section">
    <div class="current-player-info">
      <div class="player-label" id="playerLabel">轮到</div>
      <div class="player-name" id="playerName">玩家1</div>
    </div>

    <div style="position: relative; display: flex; align-items: center; justify-content: center;">
      <!-- 摇骰按钮 -->
      <div class="roll-btn" id="rollBtn" onclick="rollDice()">
        <!-- CSS 指南针 -->
        <div class="compass" id="compassEl">
          <div class="compass-ring"></div>
          <div class="compass-ring-inner"></div>
          <span class="compass-label compass-label-n">N</span>
          <span class="compass-label compass-label-s">S</span>
          <span class="compass-label compass-label-e">E</span>
          <span class="compass-label compass-label-w">W</span>
          <div class="compass-needle">
            <div class="compass-needle-n"></div>
            <div class="compass-needle-s"></div>
          </div>
          <div class="compass-center"></div>
        </div>
      </div>
    </div>

    <div class="roll-btn-text" id="rollBtnText">点击定方位</div>

    <!-- 重新选择按钮 -->
    <div class="action-btns-wrap">
      <button class="action-btn undo-btn" id="undoBtn" onclick="undoLast()">
        <span class="undo-icon">↩</span>
        重新选择
      </button>
    </div>
  </div>

  <!-- 底部重置按钮（始终可见） -->
  <div class="bottom-reset-wrap">
    <button class="bottom-reset-btn" id="bottomResetBtn" onclick="confirmReset()">
      重置
    </button>
    <div class="reset-confirm hidden" id="resetConfirm">
      <span class="reset-confirm-text">确定重置？</span>
      <button class="reset-confirm-yes" onclick="doReset()">确定</button>
      <button class="reset-confirm-no" onclick="cancelReset()">取消</button>
    </div>
  </div>

  <!-- 完成弹窗 -->
  <div class="complete-banner" id="completeBanner">
    <div class="complete-box">
      <h2>🎉 方位已定！</h2>
      <ul class="result-list" id="resultList"></ul>
      <button class="reset-btn" onclick="resetGame()">🔄 重新开始</button>
    </div>
  </div>

  <script>
    // ========== 配置 ==========
    var PLAYERS = ['玩家1', '玩家2', '玩家3', '玩家4'];
    var DIRECTIONS = [
      { id: 'north', name: '正北', color: '#4ecdc4' },
      { id: 'east',  name: '正东', color: '#ffd700' },
      { id: 'west',  name: '正西', color: '#a29bfe' },
      { id: 'south', name: '正南', color: '#ff6b6b' },
    ];

    // ========== 状态 ==========
    var currentRound = 0;
    var remaining = DIRECTIONS.slice();
    var results = [];
    var isRolling = false;

    // ========== DOM ==========
    var rollBtn = document.getElementById('rollBtn');
    var compassEl = document.getElementById('compassEl');
    var undoBtn = document.getElementById('undoBtn');
    var resetConfirm = document.getElementById('resetConfirm');

    // ========== 工具 ==========
    function randInt(max) {
      var arr = new Uint32Array(1);
      crypto.getRandomValues(arr);
      return arr[0] % max;
    }
    function sleep(ms)    { return new Promise(function(r) { setTimeout(r, ms); }); }

    // ========== 粒子爆炸 ==========
    function spawnParticles(x, y, color) {
      var colors = [color, '#fff', '#ffd700'];
      var count = window.innerWidth < 480 ? 12 : 18;
      for (var i = 0; i < count; i++) {
        var el = document.createElement('div');
        el.className = 'particle';
        var size = 4 + randInt(8);
        var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.6;
        var dist = 50 + randInt(90);
        el.style.cssText =
          'left:' + x + 'px;top:' + y + 'px;' +
          'width:' + size + 'px;height:' + size + 'px;' +
          'background:' + colors[randInt(colors.length)] + ';' +
          '--tx:' + (Math.cos(angle) * dist) + 'px;' +
          '--ty:' + (Math.sin(angle) * dist) + 'px;';
        document.body.appendChild(el);
        setTimeout(function() { el.remove(); }, 1000);
      }
    }

    // ========== 更新方位卡片 ==========
    function updateCard(dir, playerName) {
      var card = document.getElementById('card-' + dir.id);
      card.classList.add('assigned', 'highlight');
      setTimeout(function() { card.classList.remove('highlight'); }, 600);
      var existing = card.querySelector('.assigned-player');
      if (existing) existing.remove();
      var span = document.createElement('span');
      span.className = 'assigned-player';
      span.textContent = playerName;
      card.appendChild(span);
    }

    // ========== 更新进度 ==========
    function updateProgress(n) {
      for (var i = 0; i < 4; i++) {
        document.getElementById('dot' + i).classList.toggle('done', i < n);
      }
    }

    // ========== 更新按钮状态 ==========
    function updateUndoBtn() {
      if (results.length > 0 && !isRolling && currentRound < 4) {
        undoBtn.classList.add('visible');
      } else {
        undoBtn.classList.remove('visible');
      }
    }

    // ========== 二次确认重置 ==========
    function confirmReset() {
      if (results.length === 0 && currentRound === 0) return;
      resetConfirm.classList.remove('hidden');
    }

    function cancelReset() {
      resetConfirm.classList.add('hidden');
    }

    function doReset() {
      resetConfirm.classList.add('hidden');
      resetGame();
    }

    // ========== 主逻辑：摇骰 ==========
    async function rollDice() {
      if (isRolling || currentRound >= 4) return;
      isRolling = true;
      rollBtn.classList.add('disabled');
      undoBtn.classList.remove('visible');

      // 随机选方位
      var idx = randInt(remaining.length);
      var dir = remaining.splice(idx, 1)[0];
      var player = PLAYERS[currentRound];

      // 指南针快速旋转
      compassEl.classList.add('spinning');

      // 旋转 1 秒
      await sleep(1000);

      // 停止旋转
      compassEl.classList.remove('spinning');

      // 更新卡片
      updateCard(dir, player);
      results.push({ player: player, direction: dir });

      // 粒子爆炸
      var cardEl = document.getElementById('card-' + dir.id);
      var rect = cardEl.getBoundingClientRect();
      spawnParticles(
        rect.left + rect.width / 2,
        rect.top + rect.height / 2,
        dir.color
      );

      currentRound++;
      updateProgress(currentRound);

      if (currentRound >= 4) {
        document.getElementById('playerLabel').textContent = '全部完成！';
        document.getElementById('playerName').textContent = '';
        document.getElementById('rollBtnText').textContent = '';
        await sleep(600);
        showResult();
      } else {
        document.getElementById('playerName').textContent = PLAYERS[currentRound];
        rollBtn.classList.remove('disabled');
        updateUndoBtn();
      }

      isRolling = false;
    }

    // ========== 重新选择（撤销上一次） ==========
    function undoLast() {
      if (results.length === 0 || isRolling || currentRound >= 4) return;

      var last = results.pop();
      currentRound--;

      // 把方位放回剩余池
      remaining.push(last.direction);

      // 还原卡片
      var card = document.getElementById('card-' + last.direction.id);
      card.classList.remove('assigned', 'highlight');
      var p = card.querySelector('.assigned-player');
      if (p) p.remove();

      updateProgress(currentRound);

      // 恢复当前玩家
      document.getElementById('playerName').textContent = PLAYERS[currentRound];

      // 隐藏撤销按钮（如果已撤销到0次）
      updateUndoBtn();
    }

    // ========== 显示结果弹窗 ==========
    function showResult() {
      var list = document.getElementById('resultList');
      list.innerHTML = '';
      results.forEach(function(r) {
        var li = document.createElement('li');
        li.innerHTML =
          '<span class="result-player">' + r.player + '</span>' +
          '<span class="result-arrow">→</span>' +
          '<span class="result-dir" style="color:' + r.direction.color + '">' + r.direction.name + '</span>';
        list.appendChild(li);
      });
      document.getElementById('completeBanner').classList.add('show');
    }

    // ========== 重置 ==========
    function resetGame() {
      currentRound = 0;
      remaining = DIRECTIONS.slice();
      results = [];
      isRolling = false;

      DIRECTIONS.forEach(function(d) {
        var card = document.getElementById('card-' + d.id);
        card.classList.remove('assigned', 'highlight');
        var p = card.querySelector('.assigned-player');
        if (p) p.remove();
      });

      updateProgress(0);
      updateUndoBtn();

      compassEl.classList.remove('spinning');
      rollBtn.classList.remove('disabled');

      document.getElementById('playerLabel').textContent = '轮到';
      document.getElementById('playerName').textContent = '玩家1';
      document.getElementById('rollBtnText').textContent = '点击定方位';
      document.getElementById('completeBanner').classList.remove('show');
    }

    // ========== 键盘支持 ==========
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        rollDice();
      }
    });
  </script>
</body>
</html>

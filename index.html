<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>方位签 · 预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 16px 32px;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
    }

    /* 整体内容包裹，初始居中，有面板后自然撑开 */
    .page-wrap {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      min-height: 100vh;
      min-height: 100dvh;
      justify-content: center;
      padding: 20px 0 24px;
    }

    /* ===== 标题 ===== */
    .title { text-align: center; margin-bottom: 12px; }
    .title h1 {
      font-size: 1.5rem; color: #fff;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(255,200,50,0.6);
    }
    .title p { color: rgba(255,255,255,0.4); font-size: 0.75rem; margin-top: 4px; letter-spacing: 2px; }

    /* ===== 进度条 ===== */
    .progress-bar { display: flex; gap: 10px; margin-bottom: 14px; }
    .progress-dot {
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.25);
      background: transparent; transition: all 0.4s ease;
    }
    .progress-dot.done {
      background: #ffd700; border-color: #ffd700;
      box-shadow: 0 0 10px rgba(255,215,0,0.8);
    }

    /* ===== 方位卡片 ===== */
    .directions-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: min(400px, 88vw); margin-bottom: 0; margin-top: 12px;
    }
    .direction-card {
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 12px 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; transition: all 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
      position: relative; overflow: hidden; min-height: 82px;
    }
    .direction-card.assigned {
      min-height: 82px;
    }
    .direction-card.assigned {
      border-color: var(--color);
      background: rgba(var(--rgb), 0.12);
      box-shadow: 0 0 22px rgba(var(--rgb), 0.35), inset 0 0 12px rgba(var(--rgb), 0.08);
    }
    .direction-card.assigned::before {
      content: ''; position: absolute; inset: -50%;
      background: radial-gradient(circle, rgba(var(--rgb), 0.12) 0%, transparent 60%);
      animation: pulse-glow 2.5s ease-in-out infinite;
    }
    .direction-card.highlight { animation: card-flash 0.6s ease; }
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }
    @keyframes card-flash {
      0% { transform: scale(1); } 30% { transform: scale(1.06); } 100% { transform: scale(1); }
    }
    .direction-icon { font-size: 1.4rem; line-height: 1; position: relative; z-index: 1; }
    .direction-name { font-size: 1rem; font-weight: 700; letter-spacing: 2px; position: relative; z-index: 1; }
    .assigned-player {
      font-size: 0.75rem; color: rgba(255,255,255,0.9);
      letter-spacing: 1px; position: relative; z-index: 1;
      background: rgba(0,0,0,0.35); padding: 2px 10px; border-radius: 20px;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-north { --color: #4ecdc4; --rgb: 78,205,196; color: #4ecdc4; }
    .card-south { --color: #ff6b6b; --rgb: 255,107,107; color: #ff6b6b; }
    .card-west  { --color: #a29bfe; --rgb: 162,155,254; color: #a29bfe; }
    .card-east  { --color: #ffd700; --rgb: 255,215,0;   color: #ffd700; }

    /* ===== 摇骰区域 ===== */
    .roll-section { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-top: 14px; }
    .current-player-info { text-align: center; }
    .player-label { color: rgba(255,255,255,0.6); font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 3px; }
    .player-name {
      color: #ffd700; font-weight: 700; font-size: 1.5rem;
      letter-spacing: 2px; text-shadow: 0 0 12px rgba(255,215,0,0.4);
      min-height: 1.8rem;
    }

    /* ===== 摇骰按钮 ===== */
    .roll-btn {
      position: relative; width: min(150px, 38vw); height: min(150px, 38vw);
      border-radius: 50%;
      border: 3px solid rgba(255,215,0,0.4);
      background: radial-gradient(circle at 40% 35%, #2c2c55, #1a1a38);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      user-select: none;
      box-shadow: 0 8px 28px rgba(0,0,0,0.5), inset 0 0 18px rgba(255,215,0,0.07);
      transition: transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.3s ease, border-color 0.3s ease;
      overflow: hidden;
    }
    .roll-btn:not(.disabled):hover {
      transform: translateY(-4px) scale(1.04);
      box-shadow: 0 14px 38px rgba(0,0,0,0.6), 0 0 28px rgba(255,215,0,0.2);
      border-color: rgba(255,215,0,0.8);
    }
    .roll-btn:not(.disabled):active { transform: translateY(1px) scale(0.95); transition-duration: 0.1s; }
    .roll-btn.disabled { cursor: not-allowed; opacity: 0.4; pointer-events: none; }

    /* 按钮内小指南针 */
    .mini-compass {
      width: 68%; height: 68%; position: relative;
    }
    .mini-compass svg { width: 100%; height: 100%; transition: transform 0.15s ease-out; }
    .mini-compass.spinning svg { animation: compass-spin-fast 0.3s linear infinite; }
    @keyframes compass-spin-fast { to { transform: rotate(360deg); } }

    .roll-btn-text {
      font-size: 0.82rem; color: rgba(255,255,255,0.35);
      letter-spacing: 2px; margin-top: 2px;
    }

    /* ===== 操作按钮 ===== */
    .action-btns-wrap {
      height: 40px; display: flex; align-items: center;
      justify-content: center; gap: 12px; margin-top: 2px;
    }
    .action-btn {
      display: none; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); padding: 8px 20px; border-radius: 50px;
      font-size: 0.85rem; letter-spacing: 1px; cursor: pointer;
      transition: all 0.25s ease; -webkit-tap-highlight-color: transparent; font-family: inherit;
    }
    .action-btn.visible { display: inline-flex; animation: fadeIn 0.3s ease; }
    .action-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.35); color: #fff; }
    .action-btn:active { transform: scale(0.96); }

    /* ===== 右下角重置 ===== */
    .bottom-reset-wrap {
      position: fixed; bottom: 16px; right: 16px; z-index: 50; text-align: right;
    }
    .bottom-reset-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.3); padding: 5px 14px; border-radius: 50px;
      font-size: 0.7rem; letter-spacing: 1px; cursor: pointer;
      transition: all 0.25s ease; -webkit-tap-highlight-color: transparent; font-family: inherit;
    }
    .bottom-reset-btn:hover { color: rgba(255,255,255,0.6); border-color: rgba(255,255,255,0.25); }
    .reset-confirm {
      position: absolute; bottom: 100%; right: 0; margin-bottom: 8px;
      display: flex; align-items: center; gap: 8px;
      background: rgba(20,20,40,0.92); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50px; padding: 6px 12px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      animation: fadeIn 0.2s ease; white-space: nowrap;
    }
    .reset-confirm.hidden { display: none; }
    .reset-confirm-text { color: rgba(255,255,255,0.6); font-size: 0.75rem; }
    .reset-confirm-yes, .reset-confirm-no {
      padding: 4px 12px; border-radius: 50px; font-size: 0.75rem; cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.7); transition: all 0.2s ease; font-family: inherit;
    }
    .reset-confirm-yes:hover { background: rgba(255,107,107,0.2); border-color: rgba(255,107,107,0.5); color: #ff6b6b; }
    .reset-confirm-no:hover  { background: rgba(255,255,255,0.14); color: #fff; }

    /* ===== 粒子 ===== */
    .particle {
      position: fixed; pointer-events: none; border-radius: 50%;
      animation: particle-fly 0.9s ease-out forwards; z-index: 999;
    }
    @keyframes particle-fly {
      0%   { opacity: 1; transform: translate(0,0) scale(1); }
      100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0.2); }
    }

    /* ===================================================
       实时方位指南针面板（内嵌卡片，不遮挡）
    =================================================== */
    .live-compass-panel {
      display: none;
      width: min(400px, 92vw);
      background: rgba(10,10,28,0.92);
      border: 1.5px solid rgba(255,215,0,0.3);
      border-radius: 20px;
      padding: 14px 18px 18px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
      box-shadow: 0 4px 30px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,215,0,0.08);
      margin-bottom: 12px;
    }
    .live-compass-panel.show {
      display: block;
      animation: fadeIn 0.35s cubic-bezier(0.25,0.46,0.45,0.94) both;
    }

    /* 当前分配玩家 */
    .panel-current-player {
      font-size: 0.8rem; color: rgba(255,255,255,0.45);
      letter-spacing: 2px; margin-bottom: 12px;
    }
    .panel-current-player strong {
      color: #ffd700; font-size: 1rem;
    }

    /* ============================
       大指南针盘
    ============================ */
    .compass-container {
      position: relative;
      width: 160px; height: 160px;
      margin: 0 auto 10px;
    }

    /* 外圈刻度盘（随手机旋转） */
    .compass-dial {
      position: absolute; inset: 0;
      transition: transform 0.12s ease-out;
    }

    /* 固定指针层 */
    .compass-fixed {
      position: absolute; inset: 0; z-index: 3;
    }

    /* 中心圆点 */
    .needle-center {
      position: absolute; left: 50%; top: 50%;
      width: 12px; height: 12px;
      background: #fff; border-radius: 50%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 10px rgba(255,255,255,0.9);
      z-index: 5;
    }

    /* 目标方位箭头（彩色，随角度偏转） */
    .needle-target {
      position: absolute; left: 50%; top: 0;
      transform-origin: 50% 80px;  /* 半径 80px */
      transform: translateX(-50%) rotate(0deg);
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.12s ease-out;
      z-index: 4; pointer-events: none;
    }
    .needle-target-arrow {
      width: 0; height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 40px solid #4ecdc4;
      margin-top: 4px;
      filter: drop-shadow(0 0 10px currentColor);
    }
    /* 目标方位文字（固定显示在指南针下方） */
    .target-info {
      margin-top: 8px;
      text-align: center;
    }
    .target-info-name {
      font-size: 1.1rem; font-weight: 800;
      color: #4ecdc4;
      text-shadow: 0 0 12px currentColor;
      letter-spacing: 2px;
    }
    .target-info-hint {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.4);
      margin-top: 2px;
    }

    /* 当前朝向文字 */
    .heading-text {
      font-size: 2.4rem; font-weight: 900; color: #ff3030;
      letter-spacing: 3px;
      text-shadow: 0 0 18px rgba(255,48,48,0.75), 0 2px 6px rgba(0,0,0,0.5);
      margin-bottom: 2px;
      line-height: 1.1;
    }
    .heading-sub {
      font-size: 1rem; font-weight: 700; color: #ff6060;
      letter-spacing: 3px; margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(255,80,80,0.5);
    }

    /* 传感器不可用 */
    .sensor-tip {
      font-size: 0.78rem; color: rgba(255,255,255,0.4);
      line-height: 1.6; margin-bottom: 8px;
    }
    .sensor-tip .link { color: #ffd700; cursor: pointer; text-decoration: underline; }

    /* 手动旋转滑块（传感器不可用时使用） */
    .manual-rotate-wrap {
      display: none;
      margin: 10px 0;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .manual-rotate-wrap.show { display: block; }
    .manual-rotate-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .manual-rotate-slider {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.15);
      border-radius: 4px;
      outline: none;
      touch-action: pan-y;
      -webkit-tap-highlight-color: transparent;
    }
    .manual-rotate-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      background: linear-gradient(145deg, #ffd700, #ffaa00);
      border-radius: 50%;
      cursor: grab;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 12px rgba(255,215,0,0.6);
      border: 2px solid #fff;
      margin-top: -8px;
      transition: transform 0.1s ease;
    }
    .manual-rotate-slider::-webkit-slider-thumb:active {
      cursor: grabbing;
      transform: scale(1.1);
    }
    .manual-rotate-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      background: linear-gradient(145deg, #ffd700, #ffaa00);
      border-radius: 50%;
      cursor: grab;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 12px rgba(255,215,0,0.6);
    }
    .manual-rotate-slider::-moz-range-thumb:active {
      cursor: grabbing;
      transform: scale(1.1);
    }
    .manual-rotate-slider::-webkit-slider-runnable-track {
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, rgba(255,215,0,0.3) 0%, rgba(255,215,0,0.3) var(--progress, 0%), rgba(255,255,255,0.15) var(--progress, 0%));
    }
    .manual-rotate-value {
      font-size: 1.8rem;
      color: #ff3030;
      margin-top: 8px;
      font-weight: 900;
      letter-spacing: 2px;
      text-shadow: 0 0 14px rgba(255,48,48,0.65);
      text-align: center;
    }

    /* 已分配列表 */
    .assigned-list {
      display: flex; flex-direction: column; gap: 6px; margin-top: 4px;
    }
    .assigned-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.04);
      font-size: 0.88rem;
    }
    .assigned-row.latest {
      background: rgba(255,215,0,0.07);
      border: 1px solid rgba(255,215,0,0.15);
    }
    .ar-player { color: rgba(255,255,255,0.7); }
    .ar-dir    { font-weight: 700; letter-spacing: 1px; }
    .ar-badge  {
      font-size: 0.62rem; padding: 1px 8px;
      background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.3);
      color: #ffd700; border-radius: 50px;
    }

    /* ===== 完成弹窗 ===== */
    .complete-banner {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      align-items: center; justify-content: center; z-index: 100;
    }
    .complete-banner.show { display: flex; animation: fadeIn 0.3s ease; }
    .complete-box {
      background: linear-gradient(145deg, #1e1e40, #12122a);
      border: 2px solid rgba(255,215,0,0.45);
      border-radius: 24px; padding: 24px 28px 28px;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,215,0,0.12);
      animation: pop-in 0.45s cubic-bezier(0.34,1.56,0.64,1);
      max-width: min(380px, 92vw);
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }
    @keyframes pop-in {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .complete-box h2 {
      font-size: 1.5rem; color: #ffd700; letter-spacing: 4px;
      margin-bottom: 6px; text-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    .complete-sub {
      font-size: 0.78rem; color: rgba(255,255,255,0.35);
      letter-spacing: 2px; margin-bottom: 20px;
    }

    /* 弹窗结果列表 */
    .result-list { list-style: none; margin-bottom: 24px; }
    .result-list li {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 16px; border-radius: 12px; margin-bottom: 8px;
      background: rgba(255,255,255,0.05); gap: 10px;
    }
    .result-player { color: rgba(255,255,255,0.8); font-size: 0.95rem; }
    .result-arrow  { color: rgba(255,255,255,0.25); }
    .result-dir    { font-weight: 700; font-size: 1.05rem; }
    .result-compass-hint {
      font-size: 0.72rem; color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
    }

    /* 弹窗关闭按钮 */
    .close-result-btn {
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7); padding: 13px 36px; border-radius: 50px;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      letter-spacing: 2px; transition: all 0.2s ease;
      font-family: inherit; width: 100%;
    }
    .close-result-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

    /* ===== 弹窗内指南针 ===== */
    .result-compass-wrap {
      position: relative;
      width: 180px; height: 180px;
      margin: 0 auto 12px;
    }
    .result-compass-dial {
      position: absolute; inset: 0;
      transition: transform 0.12s ease-out;
    }
    .result-compass-fixed {
      position: absolute; inset: 0; z-index: 3;
    }
    .result-needle-center {
      position: absolute; left: 50%; top: 50%;
      width: 10px; height: 10px;
      background: #fff; border-radius: 50%;
      transform: translate(-50%,-50%);
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
      z-index: 5;
    }
    /* 弹窗内玩家指针 */
    .result-player-needle {
      position: absolute; left: 50%; top: 0;
      transform-origin: 50% 90px;  /* 半径 90px */
      transform: translateX(-50%) rotate(0deg);
      display: flex; flex-direction: column; align-items: center;
      transition: transform 0.12s ease-out;
      z-index: 4; pointer-events: none;
    }
    .result-player-needle-arrow {
      width: 0; height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-bottom: 24px solid #4ecdc4;
      margin-top: 12px;
    }
    .result-player-needle-label {
      font-size: 10px; font-weight: 700;
      color: #4ecdc4; margin-top: 2px;
      text-shadow: 0 0 6px currentColor;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    /* 弹窗内朝向 */
    .result-heading-text {
      font-size: 1.2rem; font-weight: 800; color: #ffd700;
      letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,215,0,0.4);
      margin-bottom: 2px;
    }
    .result-heading-sub {
      font-size: 0.68rem; color: rgba(255,255,255,0.3);
      letter-spacing: 2px; margin-bottom: 14px;
    }

    /* ===== 重新开始按钮（弹窗关闭后显示） ===== */
    .restart-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      align-items: center; justify-content: center; z-index: 90;
    }
    .restart-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
    .restart-box {
      background: linear-gradient(145deg, #1e1e40, #12122a);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 24px; padding: 36px 40px;
      text-align: center;
      animation: pop-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
      max-width: min(320px, 88vw);
    }
    .restart-box p {
      color: rgba(255,255,255,0.5); font-size: 0.9rem;
      letter-spacing: 2px; margin-bottom: 24px; line-height: 1.7;
    }
    .restart-btn {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #1a1a2e; border: none; padding: 14px 0;
      border-radius: 50px; font-size: 1.1rem; font-weight: 700;
      cursor: pointer; letter-spacing: 3px; transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4); font-family: inherit;
      width: 100%;
    }
    .restart-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,215,0,0.5); }
    .restart-btn:active { transform: scale(0.96); }

    /* ===== 响应式 ===== */
    @media (max-width: 380px) {
      .directions-grid { gap: 6px; }
      .direction-card { padding: 10px 8px; min-height: 72px; }
      .direction-name { font-size: 0.9rem; }
      .player-name { font-size: 1.3rem; }
      .compass-container { width: 140px; height: 140px; }
    }
  </style>
</head>
<body>

  <div class="page-wrap">

  <!-- 标题 -->
  <div class="title">
    <h1>🧭 方位签</h1>
    <p>4人依次点击 · 随机分配四个方向</p>
  </div>

  <!-- 进度点 -->
  <div class="progress-bar" id="progressBar">
    <div class="progress-dot" id="dot0"></div>
    <div class="progress-dot" id="dot1"></div>
    <div class="progress-dot" id="dot2"></div>
    <div class="progress-dot" id="dot3"></div>
  </div>

  <!-- ===== 实时方位指南针面板（每次摇完后显示，内嵌不遮挡） ===== -->
  <div class="live-compass-panel" id="livePanel">

    <div class="panel-current-player" id="panelCurPlayer">
      当前方位指示
    </div>

    <!-- 大指南针 -->
    <div class="compass-container" id="compassContainer">
      <!-- 旋转刻度盘 -->
      <div class="compass-dial" id="compassDial">
        <svg width="160" height="160" viewBox="0 0 200 200" id="dialSvg">
          <!-- 外圈 -->
          <circle cx="100" cy="100" r="96" fill="rgba(10,10,30,0.6)" stroke="rgba(255,215,0,0.18)" stroke-width="2"/>
          <!-- 内圈 -->
          <circle cx="100" cy="100" r="72" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>
          <!-- 刻度 -->
          <g id="tickGroup"></g>
        </svg>
      </div>

      <!-- 固定层：动态目标指针 + 中心点 -->
      <div class="compass-fixed">
        <!-- 目标方位箭头（彩色，根据摇中的方位显示） -->
        <div class="needle-target" id="needleTarget">
          <div class="needle-target-arrow" id="needleTargetArrow"></div>
        </div>
        <!-- 中心圆点 -->
        <div class="needle-center"></div>
      </div>
    </div>

    <!-- 目标方位信息（固定显示） -->
    <div class="target-info" id="targetInfo" style="display:none">
      <div class="target-info-name" id="targetInfoName"></div>
      <div class="target-info-hint">转动手机使箭头指向此方向</div>
    </div>

    <!-- 朝向显示 -->
    <div class="heading-text" id="headingText">-- °</div>
    <div class="heading-sub" id="headingSub">请转动手机查看方向</div>

    <!-- 传感器不可用提示 -->
    <div class="sensor-tip" id="sensorTip" style="display:none">
      ⚠️ 无法获取方向传感器<br>
      <span style="font-size:0.7rem;color:rgba(255,255,255,0.3)">
        iOS 需在 <strong style="color:#ffd700">设置 → Safari → 运动与方向访问</strong> 开启<br>
        或点击 <span class="link" onclick="requestPerm()">请求权限</span>
      </span>
    </div>

    <!-- 手动旋转滑块（传感器不可用时使用） -->
    <div class="manual-rotate-wrap" id="manualRotateWrap">
      <div class="manual-rotate-label">📱 拖动滑块模拟朝向角度</div>
      <input type="range" class="manual-rotate-slider" id="manualRotateSlider" min="0" max="360" value="0">
      <div class="manual-rotate-value" id="manualRotateValue">正北 0°</div>
    </div>

    <!-- 已分配列表 -->
    <div class="assigned-list" id="assignedList"></div>
  </div>

  <!-- 四个方位卡片 -->
  <div class="directions-grid">
    <div class="direction-card card-north" id="card-north">
      <div class="direction-icon">⬆️</div>
      <div class="direction-name">正北</div>
    </div>
    <div class="direction-card card-east" id="card-east">
      <div class="direction-icon">➡️</div>
      <div class="direction-name">正东</div>
    </div>
    <div class="direction-card card-west" id="card-west">
      <div class="direction-icon">⬅️</div>
      <div class="direction-name">正西</div>
    </div>
    <div class="direction-card card-south" id="card-south">
      <div class="direction-icon">⬇️</div>
      <div class="direction-name">正南</div>
    </div>
  </div>

  <!-- 摇骰区域 -->
  <div class="roll-section">
    <div class="current-player-info">
      <div class="player-label" id="playerLabel">轮到</div>
      <div class="player-name" id="playerName">玩家一</div>
    </div>

    <div class="roll-btn" id="rollBtn" onclick="rollDice()">
      <!-- 小指南针（按钮内装饰用） -->
      <div class="mini-compass" id="miniCompass">
        <svg viewBox="0 0 80 80" id="miniCompassSvg">
          <!-- 外圆 -->
          <circle cx="40" cy="40" r="38" fill="none" stroke="rgba(255,215,0,0.18)" stroke-width="1.5"/>
          <circle cx="40" cy="40" r="28" fill="none" stroke="rgba(255,215,0,0.10)" stroke-width="1"/>
          <!-- 刻度 -->
          <line x1="40" y1="2"  x2="40" y2="10" stroke="rgba(255,59,59,0.8)"  stroke-width="2.5"/>
          <line x1="40" y1="70" x2="40" y2="78" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
          <line x1="2"  y1="40" x2="10" y2="40" stroke="rgba(255,215,0,0.5)"  stroke-width="1.5"/>
          <line x1="70" y1="40" x2="78" y2="40" stroke="rgba(255,215,0,0.5)"  stroke-width="1.5"/>
          <!-- 斜方向刻度 -->
          <line x1="12.5" y1="12.5" x2="17.5" y2="17.5" stroke="rgba(255,215,0,0.2)" stroke-width="1"/>
          <line x1="62.5" y1="12.5" x2="67.5" y2="17.5" stroke="rgba(255,215,0,0.2)" stroke-width="1" transform="rotate(90,40,40)"/>
          <line x1="12.5" y1="62.5" x2="17.5" y2="67.5" stroke="rgba(255,215,0,0.2)" stroke-width="1" transform="rotate(180,40,40)"/>
          <line x1="62.5" y1="62.5" x2="67.5" y2="67.5" stroke="rgba(255,215,0,0.2)" stroke-width="1" transform="rotate(270,40,40)"/>
          <!-- 指针 -->
          <polygon points="40,5 36,40 40,36 44,40" fill="#ff3b3b" opacity="0.9"/>
          <polygon points="40,75 36,40 40,44 44,40" fill="rgba(255,255,255,0.25)"/>
          <!-- 中心点 -->
          <circle cx="40" cy="40" r="4" fill="#ffd700"/>
        </svg>
      </div>
    </div>

    <div class="roll-btn-text" id="rollBtnText">点击定方位</div>

    <div class="action-btns-wrap">
      <button class="action-btn" id="undoBtn" onclick="undoLast()">↩ 重新选择</button>
    </div>
  </div>

  <!-- 右下角重置 -->
  <div class="bottom-reset-wrap">
    <button class="bottom-reset-btn" onclick="confirmReset()">重置</button>
    <div class="reset-confirm hidden" id="resetConfirm">
      <span class="reset-confirm-text">确定重置？</span>
      <button class="reset-confirm-yes" onclick="doReset()">确定</button>
      <button class="reset-confirm-no" onclick="cancelReset()">取消</button>
    </div>
  </div>

  </div><!-- end .page-wrap -->

  <!-- ===== 4人完成弹窗 ===== -->
  <div class="complete-banner" id="completeBanner">
    <div class="complete-box">
      <h2>🎉 方位已定！</h2>
      <p class="complete-sub">转动手机查看对应方位</p>

      <!-- 弹窗内指南针 -->
      <div class="result-compass-wrap" id="resultCompassWrap">
        <div class="result-compass-dial" id="resultCompassDial">
          <svg width="180" height="180" viewBox="0 0 200 200">
            <circle cx="100" cy="100" r="96" fill="rgba(10,10,30,0.6)" stroke="rgba(255,215,0,0.18)" stroke-width="2"/>
            <circle cx="100" cy="100" r="72" fill="none" stroke="rgba(255,215,0,0.08)" stroke-width="1"/>
            <g id="resultTickGroup"></g>
          </svg>
        </div>
        <div class="result-compass-fixed" id="resultCompassFixed">
          <!-- 玩家指针将由 JS 动态插入 -->
          <div class="result-needle-center"></div>
        </div>
      </div>

      <div class="result-heading-text" id="resultHeadingText">-- °</div>
      <div class="result-heading-sub" id="resultHeadingSub">转动手机查看方向</div>

      <ul class="result-list" id="resultList"></ul>
      <button class="close-result-btn" onclick="closeResult()">好的，知道了</button>
    </div>
  </div>

  <!-- ===== 重新开始弹窗 ===== -->
  <div class="restart-overlay" id="restartOverlay">
    <div class="restart-box">
      <p>所有方位已确认<br>准备好重新开始了吗？</p>
      <button class="restart-btn" onclick="doRestart()">🔄 重新开始</button>
    </div>
  </div>

  <script>
    // ========== 配置 ==========
    var PLAYERS = ['玩家一', '玩家二', '玩家三', '玩家四'];
    var DIRECTIONS = [
      { id: 'north', name: '正北', color: '#4ecdc4', degree: 0   },
      { id: 'east',  name: '正东', color: '#ffd700', degree: 90  },
      { id: 'south', name: '正南', color: '#ff6b6b', degree: 180 },
      { id: 'west',  name: '正西', color: '#a29bfe', degree: 270 },
    ];

    // ========== 状态 ==========
    var currentRound = 0;
    var remaining = DIRECTIONS.slice();
    var results = [];
    var isRolling = false;
    var deviceHeading = null;
    var sensorActive = false;
    var permissionGranted = false;

    // ========== DOM ==========
    var rollBtn       = document.getElementById('rollBtn');
    var miniCompass   = document.getElementById('miniCompass');
    var undoBtn       = document.getElementById('undoBtn');
    var resetConfirm  = document.getElementById('resetConfirm');
    var livePanel     = document.getElementById('livePanel');
    var compassDial   = document.getElementById('compassDial');
    var needleTarget  = document.getElementById('needleTarget');
    var needleTargetArrow = document.getElementById('needleTargetArrow');
    var targetInfo        = document.getElementById('targetInfo');
    var targetInfoName    = document.getElementById('targetInfoName');
    var headingText   = document.getElementById('headingText');
    var headingSub    = document.getElementById('headingSub');
    var sensorTip     = document.getElementById('sensorTip');
    var assignedList  = document.getElementById('assignedList');
    var panelCurPlayer = document.getElementById('panelCurPlayer');

    // 弹窗指南针 DOM
    var resultCompassDial  = document.getElementById('resultCompassDial');
    var resultCompassFixed = document.getElementById('resultCompassFixed');
    var resultHeadingText  = document.getElementById('resultHeadingText');
    var resultHeadingSub   = document.getElementById('resultHeadingSub');
    var resultNeedles = [];  // 弹窗内的4根玩家指针
    var resultBannerActive = false;  // 弹窗是否可见

    // ========== 工具 ==========
    function randInt(max) {
      if (max <= 0) return 0;
      var arr = new Uint32Array(1);
      if (typeof crypto !== 'undefined' && crypto.getRandomValues) {
        crypto.getRandomValues(arr);
      } else {
        arr[0] = Math.floor(Math.random() * 0x100000000);
      }
      return arr[0] % max;
    }
    function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }

    // ========== 绘制指南针刻度（通用函数）==========
    function drawCompassTicks(groupId, radius, showNumbers) {
      var g = document.getElementById(groupId);
      if (!g) return;
      var cx = 100, cy = 100, r = radius;
      var svgNS = 'http://www.w3.org/2000/svg';
      
      for (var i = 0; i < 360; i += 5) {
        var rad = (i - 90) * Math.PI / 180;
        var isQ = i % 90 === 0;
        var isM = i % 30 === 0;
        var len = isQ ? 18 : isM ? 12 : 6;
        var inner = r - len;
        var cos = Math.cos(rad);
        var sin = Math.sin(rad);
        var x1 = cx + cos * r;
        var y1 = cy + sin * r;
        var x2 = cx + cos * inner;
        var y2 = cy + sin * inner;
        var line = document.createElementNS(svgNS, 'line');
        line.setAttribute('x1', x1.toFixed(2));
        line.setAttribute('y1', y1.toFixed(2));
        line.setAttribute('x2', x2.toFixed(2));
        line.setAttribute('y2', y2.toFixed(2));
        line.setAttribute('stroke', isQ ? 'rgba(255,215,0,0.55)' : isM ? 'rgba(255,215,0,0.3)' : 'rgba(255,215,0,0.14)');
        line.setAttribute('stroke-width', isQ ? '2.5' : isM ? '1.8' : '1');
        g.appendChild(line);

        if (showNumbers && isM && !isQ) {
          var lr = r - 26;
          var lx = cx + cos * lr;
          var ly = cy + sin * lr;
          var t = document.createElementNS(svgNS, 'text');
          t.setAttribute('x', lx.toFixed(2));
          t.setAttribute('y', ly.toFixed(2));
          t.setAttribute('text-anchor', 'middle');
          t.setAttribute('dominant-baseline', 'middle');
          t.setAttribute('fill', 'rgba(255,215,0,0.3)');
          t.setAttribute('font-size', '9');
          t.setAttribute('font-family', 'PingFang SC,Microsoft YaHei,sans-serif');
          t.textContent = String(i);
          g.appendChild(t);
        }
      }
    }

    // 初始化两个指南针刻度
    drawCompassTicks('tickGroup', 93, true);
    drawCompassTicks('resultTickGroup', 93, false);

    // ========== 传感器 ==========
    var sensorListenersRegistered = false;
    var sensorCheckTimer = null;

    function registerSensorListeners() {
      if (sensorListenersRegistered) return;
      sensorListenersRegistered = true;
      
      // 优先使用 deviceorientationabsolute（更精确），fallback 到 deviceorientation
      if ('ondeviceorientationabsolute' in window) {
        window.addEventListener('deviceorientationabsolute', onOrientation, true);
      }
      // 同时监听 deviceorientation 作为 fallback
      window.addEventListener('deviceorientation', onOrientation, true);
      
      // 2秒后检查传感器是否正常工作
      sensorCheckTimer = setTimeout(function() {
        if (!sensorActive && deviceHeading === null) {
          // 如果面板已显示，显示手动旋转滑块
          if (livePanel.classList.contains('show')) {
            showManualRotate();
          }
        }
      }, 2000);
    }

    function initSensor() {
      if (typeof DeviceOrientationEvent === 'undefined') { 
        showManualRotate(); 
        return; 
      }
      // 非 iOS 13+（没有 requestPermission）→ 直接注册
      if (typeof DeviceOrientationEvent.requestPermission !== 'function') {
        registerSensorListeners();
      }
      // iOS 13+ 需要在用户手势中调用 requestPermission，延迟到 rollDice 中处理
    }

    // 显示手动旋转滑块（传感器不可用时）
    var manualRotateInitialized = false;
    function showManualRotate() {
      // 如果传感器已经激活，不显示手动旋转
      if (sensorActive) return;
      
      var wrap = document.getElementById('manualRotateWrap');
      var slider = document.getElementById('manualRotateSlider');
      var value = document.getElementById('manualRotateValue');
      
      if (!wrap || !slider || !value) return;
      
      // 如果已经初始化过，只显示即可
      if (manualRotateInitialized) {
        wrap.classList.add('show');
        return;
      }
      
      wrap.classList.add('show');
      if (headingText) headingText.textContent = '0°';
      if (headingSub) headingSub.textContent = '模拟朝向（拖动滑块）';
      
      // 更新进度条背景
      function updateProgress(deg) {
        var percent = (deg / 360) * 100;
        slider.style.setProperty('--progress', percent + '%');
      }
      
      // 使用 requestAnimationFrame 节流更新
      var pendingUpdate = false;
      var lastDeg = 0;
      
      function doUpdate() {
        pendingUpdate = false;
        deviceHeading = lastDeg;
        updateCompassUI(lastDeg);
        var sector = Math.round(lastDeg / 22.5) % 16;
        value.textContent = DIR_NAMES_16[sector] + ' ' + lastDeg + '°';
        updateProgress(lastDeg);
      }
      
      // 监听滑块变化（使用 input 事件但节流）
      slider.addEventListener('input', function() {
        lastDeg = parseInt(this.value, 10) || 0;
        if (!pendingUpdate) {
          pendingUpdate = true;
          requestAnimationFrame(doUpdate);
        }
      });
      
      // 初始化
      updateProgress(0);
      manualRotateInitialized = true;
    }

    function tryReqPerm() {
      // iOS 13+ 需要显式请求权限
      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        if (permissionGranted) return;
        DeviceOrientationEvent.requestPermission().then(function(s) {
          if (s === 'granted') {
            permissionGranted = true;
            sensorTip.style.display = 'none';
            registerSensorListeners();
          }
        }).catch(function(err){
          // 权限请求失败，静默处理
          if (err && typeof console !== 'undefined' && console.warn) {
            console.warn('Device orientation permission request failed');
          }
        });
      } else {
        // 安卓设备：确保传感器已注册（可能在 initSensor 中已经注册过了）
        if (!sensorListenersRegistered) {
          registerSensorListeners();
        }
      }
    }

    function requestPerm() {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(function(s) {
          if (s === 'granted') {
            permissionGranted = true;
            sensorTip.style.display = 'none';
            registerSensorListeners();
          }
        }).catch(function(err){
          // 权限请求失败，显示传感器提示
          showSensorTip();
          if (err && typeof console !== 'undefined' && console.warn) {
            console.warn('Device orientation permission failed:', err);
          }
        });
      }
    }

    function showSensorTip() {
      sensorTip.style.display = 'block';
      headingText.style.display = 'none';
      headingSub.style.display = 'none';
    }

    var DIR_NAMES_16 = ['北','北北东','东北','东北东','东','东南东','东南','南南东','南','南南西','西南','西南西','西','西北西','西北','北北西'];

    function onOrientation(e) {
      if (!e) return;
      var h = null;
      // iOS Safari: webkitCompassHeading 最可靠
      var webkitHeading = e.webkitCompassHeading;
      if (webkitHeading !== undefined && webkitHeading !== null && !isNaN(webkitHeading)) {
        h = webkitHeading;
      }
      // Android Chrome: 使用 alpha
      else {
        var alpha = e.alpha;
        if (alpha !== null && alpha !== undefined && !isNaN(alpha)) {
          h = 360 - alpha;
        }
      }
      
      if (h === null || isNaN(h)) {
        return;
      }
      h = (h + 360) % 360;
      deviceHeading = h;
      sensorActive = true;
      sensorTip.style.display = 'none';
      if (headingText.style.display === 'none') {
        headingText.style.display = '';
        headingSub.style.display = '';
      }
      updateCompassUI(h);
      // 同时更新弹窗指南针
      if (resultBannerActive) updateResultCompassUI(h);
    }

    function updateCompassUI(h) {
      if (!compassDial || !headingText || !headingSub) return;
      if (typeof h !== 'number' || isNaN(h)) return;
      // 刻度盘反向旋转
      compassDial.style.transform = 'rotate(' + (-h) + 'deg)';
      // 朝向文字
      var sector = Math.round(h / 22.5) % 16;
      headingText.textContent = Math.round(h) + '°';
      headingSub.textContent = '当前朝向：' + DIR_NAMES_16[sector];
      // 更新目标指针
      updateTargetNeedle(h);
    }

    // 弹窗内指南针 UI 更新
    function updateResultCompassUI(h) {
      if (!resultCompassDial || !resultHeadingText || !resultHeadingSub) return;
      if (typeof h !== 'number' || isNaN(h)) return;
      resultCompassDial.style.transform = 'rotate(' + (-h) + 'deg)';
      var sector = Math.round(h / 22.5) % 16;
      resultHeadingText.textContent = Math.round(h) + '°';
      resultHeadingSub.textContent = '当前朝向：' + DIR_NAMES_16[sector];
      // 更新4根玩家指针（使用最短路径避免0°/360°跳跃）
      if (Array.isArray(resultNeedles)) {
        resultNeedles.forEach(function(n) {
          if (!n || !n.el) return;
          var rawOffset = (n.degree - h + 360) % 360;
          var lastAngle = n.lastAngle || 0;
          var diff = rawOffset - (lastAngle % 360);
          if (diff > 180) diff -= 360;
          if (diff < -180) diff += 360;
          n.lastAngle = lastAngle + diff;
          n.el.style.transform = 'translateX(-50%) rotate(' + n.lastAngle + 'deg)';
        });
      }
    }

    // ========== 当前目标方位 ==========
    var currentTargetDeg = null;
    var lastNeedleAngle = 0;  // 记录指针上一次的角度，用于平滑跨越0°/360°边界

    function updateTargetNeedle(heading) {
      if (currentTargetDeg === null || !needleTarget) return;
      var safeHeading = (typeof heading === 'number' && !isNaN(heading)) ? heading : 0;
      // 计算目标相对当前朝向的偏移角度
      var rawOffset = (currentTargetDeg - safeHeading + 360) % 360;
      // 选择最短路径：如果差值大于180°，则反向旋转
      var diff = rawOffset - (lastNeedleAngle % 360);
      if (diff > 180) diff -= 360;
      if (diff < -180) diff += 360;
      lastNeedleAngle += diff;
      needleTarget.style.transform = 'translateX(-50%) rotate(' + lastNeedleAngle + 'deg)';
    }

    // ========== 更新面板 ==========
    function updateLivePanel() {
      // 更新分配列表
      assignedList.textContent = '';
      results.forEach(function(r, i) {
        var isLatest = (i === results.length - 1);
        var row = document.createElement('div');
        row.className = 'assigned-row' + (isLatest ? ' latest' : '');
        
        var playerSpan = document.createElement('span');
        playerSpan.className = 'ar-player';
        playerSpan.textContent = r.player;
        row.appendChild(playerSpan);
        
        var dirSpan = document.createElement('span');
        dirSpan.className = 'ar-dir';
        dirSpan.style.color = r.direction.color;
        dirSpan.textContent = r.direction.name;
        row.appendChild(dirSpan);
        
        if (isLatest) {
          var badge = document.createElement('span');
          badge.className = 'ar-badge';
          badge.textContent = '当前';
          row.appendChild(badge);
        }
        
        assignedList.appendChild(row);
      });

      // 设置目标指针颜色和名称
      if (results.length > 0) {
        var latest = results[results.length - 1];
        currentTargetDeg = latest.direction.degree;
        needleTargetArrow.style.borderBottomColor = latest.direction.color;
        needleTargetArrow.style.filter = 'drop-shadow(0 0 8px ' + latest.direction.color + ')';
        targetInfo.style.display = 'block';
        targetInfoName.textContent = latest.direction.name;
        targetInfoName.style.color = latest.direction.color;

        // 更新面板标题
        panelCurPlayer.textContent = '';
        var strong1 = document.createElement('strong');
        strong1.textContent = latest.player;
        panelCurPlayer.appendChild(strong1);
        panelCurPlayer.appendChild(document.createTextNode(' 的方位：'));
        var strong2 = document.createElement('strong');
        strong2.style.color = latest.direction.color;
        strong2.textContent = latest.direction.name;
        panelCurPlayer.appendChild(strong2);

        // 立即渲染指南针
        if (sensorActive && deviceHeading !== null) {
          // 传感器正常工作，正常更新
          updateCompassUI(deviceHeading);
          updateTargetNeedle(deviceHeading);
        } else if (!sensorActive) {
          // 传感器未激活，显示手动旋转滑块
          showManualRotate();
          // 箭头静止指向对应方位（从正北顺时针）
          needleTarget.style.transform = 'translateX(-50%) rotate(' + latest.direction.degree + 'deg)';
        }
      }
    }

    // ========== 粒子 ==========
    function spawnParticles(x, y, color) {
      var count = window.innerWidth < 480 ? 12 : 18;
      for (var i = 0; i < count; i++) {
        var el = document.createElement('div');
        el.className = 'particle';
        var size = 4 + randInt(8);
        var angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.6;
        var dist  = 50 + randInt(90);
        el.style.cssText =
          'left:' + x + 'px;top:' + y + 'px;' +
          'width:' + size + 'px;height:' + size + 'px;' +
          'background:' + color + ';' +
          '--tx:' + (Math.cos(angle) * dist) + 'px;' +
          '--ty:' + (Math.sin(angle) * dist) + 'px;';
        document.body.appendChild(el);
        setTimeout(function(){ el.remove(); }, 1000);
      }
    }

    // ========== 更新卡片 ==========
    function updateCard(dir, playerName) {
      var card = document.getElementById('card-' + dir.id);
      card.classList.add('assigned', 'highlight');
      setTimeout(function(){ card.classList.remove('highlight'); }, 600);
      var ex = card.querySelector('.assigned-player');
      if (ex) ex.remove();
      var sp = document.createElement('span');
      sp.className = 'assigned-player';
      sp.textContent = playerName;
      card.appendChild(sp);
    }

    function updateProgress(n) {
      for (var i = 0; i < 4; i++)
        document.getElementById('dot' + i).classList.toggle('done', i < n);
    }

    function updateUndoBtn() {
      if (results.length > 0 && !isRolling && currentRound < 4)
        undoBtn.classList.add('visible');
      else
        undoBtn.classList.remove('visible');
    }

    // ========== 重置确认 ==========
    function confirmReset() {
      if (results.length === 0 && currentRound === 0) return;
      resetConfirm.classList.remove('hidden');
    }
    function cancelReset() { resetConfirm.classList.add('hidden'); }
    function doReset()     { resetConfirm.classList.add('hidden'); resetGame(); }

    // ========== 主逻辑 ==========
    async function rollDice() {
      if (isRolling || currentRound >= 4) return;
      isRolling = true;
      rollBtn.classList.add('disabled');
      undoBtn.classList.remove('visible');

      try {
        tryReqPerm();

        var idx = randInt(remaining.length);
        var dir = remaining.splice(idx, 1)[0];
        var player = PLAYERS[currentRound];

        // 小指南针旋转动画
        miniCompass.classList.add('spinning');
        await sleep(900);
        miniCompass.classList.remove('spinning');

        // 更新卡片、记录结果
        updateCard(dir, player);
        results.push({ player: player, direction: dir });

        // 粒子
        var cardEl = document.getElementById('card-' + dir.id);
        if (cardEl) {
          var rect = cardEl.getBoundingClientRect();
          spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, dir.color);
        }

        currentRound++;
        updateProgress(currentRound);

        // 更新并显示实时面板
        updateLivePanel();
        if (!livePanel.classList.contains('show')) {
          livePanel.classList.add('show');
        }

        if (currentRound >= 4) {
          document.getElementById('playerLabel').textContent = '全部完成！';
          document.getElementById('playerName').textContent  = '';
          document.getElementById('rollBtnText').textContent = '';
          rollBtn.classList.add('disabled');
          await sleep(800);
          showResult();
        } else {
          document.getElementById('playerName').textContent = PLAYERS[currentRound];
          rollBtn.classList.remove('disabled');
          updateUndoBtn();
        }
      } catch (err) {
        // 恢复状态
        isRolling = false;
        rollBtn.classList.remove('disabled');
        updateUndoBtn();
        // 重新抛出以便上层处理
        throw err;
      }

      isRolling = false;
    }

    // ========== 撤销 ==========
    function undoLast() {
      if (results.length === 0 || isRolling || currentRound >= 4) return;
      var last = results.pop();
      currentRound--;
      remaining.push(last.direction);
      var card = document.getElementById('card-' + last.direction.id);
      card.classList.remove('assigned', 'highlight');
      var p = card.querySelector('.assigned-player');
      if (p) p.remove();
      updateProgress(currentRound);
      document.getElementById('playerName').textContent = PLAYERS[currentRound];
      updateUndoBtn();

      if (results.length > 0) {
        updateLivePanel();
      } else {
        livePanel.classList.remove('show');
        currentTargetDeg = null;
        targetInfo.style.display = 'none';
        // 重置指南针到初始状态
        compassDial.style.transform = 'rotate(0deg)';
        needleTarget.style.transform = 'translateX(-50%) rotate(0deg)';
        headingText.textContent = '-- °';
        headingSub.textContent = '请转动手机查看方向';
      }
    }

    // ========== 完成弹窗 ==========
    function showResult() {
      // 生成4根玩家指针
      resultNeedles = [];
      // 先清理旧的
      resultCompassFixed.querySelectorAll('.result-player-needle').forEach(function(el){ el.remove(); });

      results.forEach(function(r) {
        var wrap = document.createElement('div');
        wrap.className = 'result-player-needle';

        var arrow = document.createElement('div');
        arrow.className = 'result-player-needle-arrow';
        arrow.style.borderBottomColor = r.direction.color;
        arrow.style.filter = 'drop-shadow(0 0 6px ' + r.direction.color + ')';

        var label = document.createElement('div');
        label.className = 'result-player-needle-label';
        label.textContent = r.player;
        label.style.color = r.direction.color;

        wrap.appendChild(arrow);
        wrap.appendChild(label);

        // 插入到中心点前面
        var centerDot = resultCompassFixed.querySelector('.result-needle-center');
        if (centerDot) {
          resultCompassFixed.insertBefore(wrap, centerDot);
        } else {
          resultCompassFixed.appendChild(wrap);
        }

        // 计算初始角度
        var deg = r.direction.degree;
        var initialAngle;
        if (deviceHeading !== null) {
          initialAngle = (deg - deviceHeading + 360) % 360;
          wrap.style.transform = 'translateX(-50%) rotate(' + initialAngle + 'deg)';
        } else {
          initialAngle = deg;
          wrap.style.transform = 'translateX(-50%) rotate(' + initialAngle + 'deg)';
        }

        resultNeedles.push({ el: wrap, degree: deg, lastAngle: initialAngle });
      });

      // 设置初始朝向
      if (deviceHeading !== null) {
        var sector = Math.round(deviceHeading / 22.5) % 16;
        resultHeadingText.textContent = Math.round(deviceHeading) + '°';
        resultHeadingSub.textContent  = '当前朝向：' + DIR_NAMES_16[sector];
        resultCompassDial.style.transform = 'rotate(' + (-deviceHeading) + 'deg)';
      } else {
        // 检测是否为桌面端（无传感器）
        var isDesktop = !('ontouchstart' in window) || window.matchMedia('(pointer: fine)').matches;
        resultHeadingText.textContent = isDesktop ? '桌面端' : '-- °';
        resultHeadingSub.textContent  = isDesktop ? '请在手机上使用以查看实时方位' : '转动手机查看方向';
      }

      resultBannerActive = true;

      // 生成列表
      var list = document.getElementById('resultList');
      list.textContent = '';
      results.forEach(function(r) {
        var li = document.createElement('li');
        
        var playerSpan = document.createElement('span');
        playerSpan.className = 'result-player';
        playerSpan.textContent = r.player;
        li.appendChild(playerSpan);
        
        var arrowSpan = document.createElement('span');
        arrowSpan.className = 'result-arrow';
        arrowSpan.textContent = '→';
        li.appendChild(arrowSpan);
        
        var dirSpan = document.createElement('span');
        dirSpan.className = 'result-dir';
        dirSpan.style.color = r.direction.color;
        dirSpan.textContent = r.direction.name;
        li.appendChild(dirSpan);
        
        list.appendChild(li);
      });
      document.getElementById('completeBanner').classList.add('show');
    }

    // 关闭完成弹窗 → 显示重新开始弹窗
    function closeResult() {
      document.getElementById('completeBanner').classList.remove('show');
      resultBannerActive = false;
      resultNeedles = [];
      // 清理弹窗内指针
      resultCompassFixed.querySelectorAll('.result-player-needle').forEach(function(el){ el.remove(); });
      // 同时隐藏实时面板
      livePanel.classList.remove('show');
      // 延迟显示重新开始弹窗
      setTimeout(function(){
        document.getElementById('restartOverlay').classList.add('show');
      }, 300);
    }

    // 重新开始
    function doRestart() {
      document.getElementById('restartOverlay').classList.remove('show');
      resetGame();
    }

    // ========== 重置 ==========
    function resetGame() {
      // 清理定时器
      if (sensorCheckTimer) {
        clearTimeout(sensorCheckTimer);
        sensorCheckTimer = null;
      }

      currentRound = 0;
      remaining = DIRECTIONS.slice();
      results = [];
      isRolling = false;
      currentTargetDeg = null;
      deviceHeading = null;
      sensorActive = false;
      manualRotateInitialized = false;

      DIRECTIONS.forEach(function(d) {
        var card = document.getElementById('card-' + d.id);
        card.classList.remove('assigned','highlight');
        var p = card.querySelector('.assigned-player');
        if (p) p.remove();
      });

      updateProgress(0);
      updateUndoBtn();
      miniCompass.classList.remove('spinning');
      rollBtn.classList.remove('disabled');
      document.getElementById('playerLabel').textContent = '轮到';
      document.getElementById('playerName').textContent  = '玩家一';
      document.getElementById('rollBtnText').textContent = '点击定方位';
      document.getElementById('completeBanner').classList.remove('show');
      document.getElementById('restartOverlay').classList.remove('show');

      livePanel.classList.remove('show');
      assignedList.textContent = '';
      targetInfo.style.display = 'none';
      headingText.textContent = '-- °';
      headingSub.textContent  = '请转动手机查看方向';
      headingText.style.display = '';
      headingSub.style.display = '';
      sensorTip.style.display = 'none';

      // 隐藏手动旋转滑块
      var manualWrap = document.getElementById('manualRotateWrap');
      if (manualWrap) manualWrap.classList.remove('show');

      // 重置弹窗状态
      resultBannerActive = false;
      resultNeedles = [];
      resultCompassFixed.querySelectorAll('.result-player-needle').forEach(function(el){ el.remove(); });
    }

    // ========== 键盘 ==========
    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); rollDice(); }
    });

    // ========== 初始化传感器 ==========
    initSensor();
  </script>
</body>
</html>
